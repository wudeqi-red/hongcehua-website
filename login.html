<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台登录 - 红策划</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 30% 40%, rgba(255,71,87,0.18) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 80%, rgba(162,155,254,0.12) 0%, transparent 50%),
                        var(--bg);
        }
        .login-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.4);
        }
        .login-logo { text-align: center; margin-bottom: 32px; }
        .login-logo .logo-big { font-size: 36px; font-weight: 900; display: block; margin-bottom: 6px; }
        .login-logo p { color: var(--text-muted); font-size: 14px; }
        .login-form { display: flex; flex-direction: column; gap: 16px; }
        .login-field { display: flex; flex-direction: column; gap: 6px; }
        .login-field label { font-size: 13px; color: var(--text-muted); font-weight: 600; }
        .login-field .input-wrap { position: relative; }
        .login-field input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 13px 16px;
            color: white;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .login-field input:focus { border-color: var(--primary); }
        .login-field input::placeholder { color: var(--text-muted); }
        .eye-btn {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 16px; padding: 0; transition: color 0.2s;
        }
        .eye-btn:hover { color: white; }
        .login-btn {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: white; border: none; border-radius: 12px;
            padding: 14px; font-size: 16px; font-weight: 700;
            cursor: pointer; font-family: inherit; transition: all 0.3s;
            margin-top: 4px; box-shadow: 0 8px 30px rgba(255,71,87,0.35);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,71,87,0.5); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .login-error {
            background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3);
            color: #ff6b81; border-radius: 10px; padding: 10px 14px;
            font-size: 13px; display: none; text-align: center;
        }
        .login-error.show { display: block; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: var(--text-muted); font-size: 13px; text-decoration: none; transition: color 0.2s; }
        .back-link a:hover { color: white; }
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .reset-link { text-align: center; margin-top: 8px; }
        .reset-link a { color: var(--text-muted); font-size: 12px; text-decoration: none; cursor: pointer; transition: color 0.2s; }
        .reset-link a:hover { color: var(--primary); }

        /* 重置密码面板 */
        .reset-panel {
            display: none;
            flex-direction: column;
            gap: 14px;
        }
        .reset-panel.show { display: flex; }
        .panel-title { font-size: 15px; font-weight: 700; color: white; text-align: center; margin-bottom: 4px; }
        .panel-sub { font-size: 12px; color: var(--text-muted); text-align: center; line-height: 1.6; }
        .reset-code-box { display: flex; gap: 8px; }
        .reset-code-box input { flex: 1; }
        .reset-code-box button {
            background: rgba(255,71,87,0.15); border: 1px solid rgba(255,71,87,0.3);
            color: var(--primary); border-radius: 10px; padding: 0 14px;
            font-size: 13px; cursor: pointer; white-space: nowrap; font-family: inherit;
            transition: all 0.2s;
        }
        .reset-code-box button:hover { background: rgba(255,71,87,0.25); }
        .reset-code-box button:disabled { opacity: 0.5; cursor: not-allowed; }
        .back-to-login { text-align: center; margin-top: 4px; }
        .back-to-login a { color: var(--text-muted); font-size: 13px; text-decoration: none; cursor: pointer; }
        .back-to-login a:hover { color: white; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-logo">
            <span class="logo-big">🔴 红<span style="color:var(--primary)">策划</span></span>
            <p>后台管理系统 · 请登录</p>
        </div>

        <!-- 登录面板 -->
        <div class="login-form" id="loginPanel">
            <div class="login-field">
                <label>账号</label>
                <div class="input-wrap">
                    <input type="text" id="loginUser" placeholder="请输入账号" autocomplete="username">
                </div>
            </div>
            <div class="login-field">
                <label>密码</label>
                <div class="input-wrap">
                    <input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password"
                        onkeydown="if(event.key==='Enter') doLogin()">
                    <button class="eye-btn" onclick="togglePass('loginPass', this)" tabindex="-1">👁</button>
                </div>
            </div>
            <div class="login-error" id="loginError">账号或密码错误，请重试</div>
            <button class="login-btn" id="loginBtn" onclick="doLogin()">登 录</button>
            <div class="reset-link">
                <a onclick="showReset()">忘记密码？</a>
            </div>
        </div>

        <!-- 忘记密码面板（超级重置码） -->
        <div class="reset-panel" id="resetPanel">
            <div class="panel-title">重置管理员密码</div>
            <div class="panel-sub">请输入超级重置码，重置后密码将恢复为默认值<br><strong style="color:white">hongcehua2024</strong></div>
            <div class="login-field">
                <label>超级重置码</label>
                <div class="input-wrap">
                    <input type="password" id="resetCode" placeholder="请输入超级重置码">
                    <button class="eye-btn" onclick="togglePass('resetCode', this)" tabindex="-1">👁</button>
                </div>
            </div>
            <div class="login-error" id="resetError"></div>
            <button class="login-btn" onclick="doReset()">确认重置</button>
            <div class="back-to-login"><a onclick="showLogin()">← 返回登录</a></div>
        </div>

        <div class="back-link">
            <a href="index.html">← 返回前台网站</a>
        </div>
    </div>

    <!-- CloudBase SDK -->
    <script src="https://imgcache.qq.com/qcloud/cloudbase-js-sdk/1.3.5/cloudbase.full.js"></script>
    <script src="js/cloud.js"></script>
    <script>
    /* ---- 页面初始化 ---- */
    window.addEventListener('load', async () => {
        // 如果已登录直接跳后台
        const sess = sessionStorage.getItem('hc_logged_user');
        if (sess) { window.location.href = 'admin.html'; return; }
        // 确保管理员账号存在
        await ensureAdminExists();
    });

    /* ---- 登录 ---- */
    async function doLogin() {
        const username = document.getElementById('loginUser').value.trim();
        const password = document.getElementById('loginPass').value;
        const errEl    = document.getElementById('loginError');
        const btn      = document.getElementById('loginBtn');

        if (!username || !password) {
            showLoginError('请输入账号和密码');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div> 验证中...';

        try {
            const user = await verifyLogin(username, password);
            if (user) {
                sessionStorage.setItem('hc_logged_user', JSON.stringify({
                    _id: user._id,
                    username: user.username,
                    role: user.role
                }));
                window.location.href = 'admin.html';
            } else {
                showLoginError('账号或密码错误，请重试');
                document.getElementById('loginPass').value = '';
                btn.disabled = false;
                btn.innerHTML = '登 录';
            }
        } catch(e) {
            showLoginError('网络异常，请稍后重试');
            btn.disabled = false;
            btn.innerHTML = '登 录';
        }
    }

    function showLoginError(msg) {
        const el = document.getElementById('loginError');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 3500);
    }

    /* ---- 忘记密码 ---- */
    // 超级重置码（固定，用于紧急重置，仅你自己知道）
    const SUPER_RESET_CODE = 'hongReset@2024';

    function showReset() {
        document.getElementById('loginPanel').style.display = 'none';
        document.getElementById('resetPanel').classList.add('show');
    }

    function showLogin() {
        document.getElementById('resetPanel').classList.remove('show');
        document.getElementById('loginPanel').style.display = '';
    }

    async function doReset() {
        const code = document.getElementById('resetCode').value;
        if (code !== SUPER_RESET_CODE) {
            const el = document.getElementById('resetError');
            el.textContent = '重置码错误';
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3000);
            return;
        }
        try {
            // 找到 admin 账号重置密码
            const admin = await findUser('admin');
            if (admin) {
                await changePassword(admin._id, 'hongcehua2024');
            } else {
                await createUser('admin', 'hongcehua2024', 'admin', '');
            }
            alert('密码已重置为：hongcehua2024\n请登录后立即修改密码！');
            showLogin();
            document.getElementById('loginUser').value = 'admin';
        } catch(e) {
            alert('重置失败，请检查网络');
        }
    }

    /* ---- 工具 ---- */
    function togglePass(inputId, btn) {
        const input = document.getElementById(inputId);
        if (!input) return;
        if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
        else { input.type = 'password'; btn.textContent = '👁'; }
    }
    </script>
</body>
</html>
